---
name: Ruff

on:
  push:
    branches:
      - main
      - test
    paths-ignore:
      - "**/README.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: |
          sudo apt install pipx
          pipx install ruff

      - name: Run ruff
        run: ruff check archiveyoutube.py
